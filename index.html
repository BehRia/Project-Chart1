<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        .tooltip {
            position: absolute;
            background: white;
            border: 1px solid #ccc;
            padding: 8px;
            display: none;
        }
    </style>
</head>
<body>

<h2>Social Media Impact on Mental Health</h2>

<div class="tooltip"></div>

<svg width="800" height="500"></svg>

<script>

const svg = d3.select("svg");
const width = 800;
const height = 500;
const margin = {top: 50, right: 50, bottom: 50, left: 60};

const tooltip = d3.select(".tooltip");

d3.csv("Social_media_impact_on_life.csv").then(function(data) {

    data.forEach(d => {
        d.Avg_Daily_Usage_Hours = +d.Avg_Daily_Usage_Hours;
        d.Mental_Health_Score = +d.Mental_Health_Score;
    });

    const x = d3.scaleLinear()
        .domain([0, d3.max(data, d => d.Avg_Daily_Usage_Hours)])
        .range([margin.left, width - margin.right]);

    const y = d3.scaleLinear()
        .domain([0, 10])
        .range([height - margin.bottom, margin.top]);

    // X Axis
    svg.append("g")
        .attr("transform", `translate(0, ${height - margin.bottom})`)
        .call(d3.axisBottom(x));

    // Y Axis
    svg.append("g")
        .attr("transform", `translate(${margin.left}, 0)`)
        .call(d3.axisLeft(y));

    // Axis Labels
    svg.append("text")
        .attr("x", width / 2)
        .attr("y", height)
        .attr("text-anchor", "middle")
        .text("Daily Usage (Hours)");

    svg.append("text")
        .attr("x", -height / 2)
        .attr("y", 15)
        .attr("transform", "rotate(-90)")
        .attr("text-anchor", "middle")
        .text("Mental Health Score");

    // Draw circles
    svg.selectAll("circle")
        .data(data)
        .enter()
        .append("circle")
        .attr("cx", d => x(d.Avg_Daily_Usage_Hours))
        .attr("cy", d => y(d.Mental_Health_Score))
        .attr("r", 5)
        .attr("fill", d => {
            if (d.Overall_Impact === "Positive") return "green";
            if (d.Overall_Impact === "Negative") return "red";
            return "gray";
        })
        .on("mouseover", function(event, d) {
            tooltip.style("display", "block")
                .html(`
                    Usage: ${d.Avg_Daily_Usage_Hours} hrs <br>
                    Score: ${d.Mental_Health_Score} <br>
                    Platform: ${d.Most_Used_Platform}
                `);
        })
        .on("mousemove", function(event) {
            tooltip.style("left", (event.pageX + 10) + "px")
                   .style("top", (event.pageY - 20) + "px");
        })
        .on("mouseout", function() {
            tooltip.style("display", "none");
        });

});

</script>

</body>
</html>
